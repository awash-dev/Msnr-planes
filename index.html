<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>30-Day 25% Trading Plan</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #e8e8e0;
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 48px;
  }

  .header {
    text-align: center;
    margin-bottom: 32px;
  }

  .header .eyebrow {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: #c9a84c;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .header h1 {
    font-size: 28px;
    font-weight: 900;
    color: #ffffff;
    line-height: 1.1;
  }

  .header h1 span {
    color: #c9a84c;
  }

  .stats-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .stat-card {
    background: #13131a;
    border: 1px solid #1e1e2e;
    border-radius: 10px;
    padding: 14px 20px;
    text-align: center;
    min-width: 120px;
  }

  .stat-card .val {
    font-family: 'Share Tech Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    color: #c9a84c;
  }

  .stat-card .lbl {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #555570;
    margin-top: 4px;
  }

  .table-wrap {
    max-width: 680px;
    margin: 0 auto;
    background: #0e0e16;
    border-radius: 14px;
    border: 1px solid #1a1a2a;
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead tr {
    background: #13131f;
    border-bottom: 2px solid #c9a84c33;
  }

  thead th {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #c9a84c;
    padding: 14px 16px;
    text-align: right;
  }

  thead th:first-child { text-align: center; }
  thead th:nth-child(5) { text-align: center; }

  tbody tr {
    border-bottom: 1px solid #13131f;
    transition: background 0.15s;
  }

  tbody tr:hover { background: #14141e; }

  tbody tr.milestone {
    border-top: 1px solid #c9a84c44;
    border-bottom: 1px solid #c9a84c44;
    background: #16141a;
  }

  tbody tr.milestone td { color: #fff; }

  td {
    padding: 11px 16px;
    font-size: 13px;
    color: #b0b0c0;
    text-align: right;
  }

  td:first-child {
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: #555570;
    font-weight: 600;
  }

  td.balance {
    font-family: 'Share Tech Mono', monospace;
    color: #e0e0f0;
    font-size: 13px;
  }

  td.profit {
    font-family: 'Share Tech Mono', monospace;
    color: #4caf87;
    font-size: 13px;
  }

  td.expected {
    font-family: 'Share Tech Mono', monospace;
    color: #c9a84c;
    font-weight: 700;
    font-size: 13px;
  }

  td.achieved {
    text-align: center;
  }

  .check-box {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    border: 1.5px solid #2a2a3a;
    border-radius: 5px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
    user-select: none;
  }

  .check-box.done {
    background: #1a3a2a;
    border-color: #4caf87;
    color: #4caf87;
  }

  .check-box.failed {
    background: #3a1a1a;
    border-color: #af4c4c;
    color: #af4c4c;
  }

  .milestone-tag {
    display: inline-block;
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    background: #c9a84c22;
    color: #c9a84c;
    border-radius: 4px;
    padding: 2px 6px;
    margin-left: 6px;
    vertical-align: middle;
  }

  .footer {
    max-width: 680px;
    margin: 20px auto 0;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: #555570;
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 2px;
  }

  .progress-bar-wrap {
    max-width: 680px;
    margin: 0 auto 20px;
    background: #13131f;
    border-radius: 8px;
    padding: 14px 20px;
    border: 1px solid #1a1a2a;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .progress-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #555570;
    font-family: 'Share Tech Mono', monospace;
    white-space: nowrap;
  }

  .bar-outer {
    flex: 1;
    height: 6px;
    background: #1e1e2e;
    border-radius: 3px;
    overflow: hidden;
  }

  .bar-inner {
    height: 100%;
    background: linear-gradient(90deg, #c9a84c, #e8c96a);
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  .progress-pct {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: #c9a84c;
    white-space: nowrap;
  }

  .tap-hint {
    text-align: center;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #333348;
    margin-bottom: 12px;
    font-family: 'Share Tech Mono', monospace;
  }
</style>
</head>
<body>

<div class="header">
  <div class="eyebrow">MSNR Trading Plan · 1:2000 Leverage</div>
  <h1>30-Day <span>25%</span> Growth Table</h1>
</div>

<div class="stats-row">
  <div class="stat-card">
    <div class="val">$5.00</div>
    <div class="lbl">Start Capital</div>
  </div>
  <div class="stat-card">
    <div class="val">25%</div>
    <div class="lbl">Daily Target</div>
  </div>
  <div class="stat-card">
    <div class="val" id="stat-end">$4,038</div>
    <div class="lbl">Day 30 Target</div>
  </div>
  <div class="stat-card">
    <div class="val" id="stat-done">0</div>
    <div class="lbl">Days Done</div>
  </div>
</div>

<div class="progress-bar-wrap">
  <span class="progress-label">Progress</span>
  <div class="bar-outer">
    <div class="bar-inner" id="progress-bar" style="width:0%"></div>
  </div>
  <span class="progress-pct" id="progress-pct">0 / 30</span>
</div>

<p class="tap-hint">Tap ✓ to mark achieved · Tap again to mark ✗ · Tap again to reset</p>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Day</th>
        <th>Balance</th>
        <th>Profit 25%</th>
        <th>Expected</th>
        <th>Done?</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>
</div>

<div class="footer">
  <div class="legend-item">
    <div class="legend-dot" style="background:#4caf87"></div>
    <span>Achieved</span>
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#af4c4c"></div>
    <span>Missed</span>
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#c9a84c"></div>
    <span>Milestone day</span>
  </div>
</div>

<script>
  const milestones = { 4: '$10', 11: '$50', 13: '$100', 21: '$500', 24: '$1K' };
  const rows = [];

  let bal = 5.00;
  for (let d = 1; d <= 30; d++) {
    const profit = bal * 0.25;
    const expected = bal + profit;
    rows.push({ day: d, balance: bal, profit, expected });
    bal = expected;
  }

  // Load state
  const state = JSON.parse(localStorage.getItem('msnr_state') || '{}');

  function fmt(n) {
    if (n >= 1000) return '$' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    return '$' + n.toFixed(2);
  }

  function render() {
    const tbody = document.getElementById('table-body');
    tbody.innerHTML = '';

    let doneCount = 0;

    rows.forEach(r => {
      const s = state[r.day] || 0; // 0=empty, 1=done, 2=failed
      if (s === 1) doneCount++;

      const isMilestone = milestones[r.day];
      const tr = document.createElement('tr');
      if (isMilestone) tr.classList.add('milestone');

      const milTag = isMilestone ? `<span class="milestone-tag">${milestones[r.day]}</span>` : '';

      tr.innerHTML = `
        <td>${r.day}</td>
        <td class="balance">${fmt(r.balance)}</td>
        <td class="profit">+${fmt(r.profit)}</td>
        <td class="expected">${fmt(r.expected)}${milTag}</td>
        <td class="achieved">
          <div class="check-box ${s === 1 ? 'done' : s === 2 ? 'failed' : ''}" data-day="${r.day}">
            ${s === 1 ? '✓' : s === 2 ? '✗' : ''}
          </div>
        </td>
      `;
      tbody.appendChild(tr);
    });

    // Update stats
    document.getElementById('stat-done').textContent = doneCount;
    document.getElementById('progress-pct').textContent = `${doneCount} / 30`;
    document.getElementById('progress-bar').style.width = `${(doneCount / 30) * 100}%`;
  }

  document.getElementById('table-body').addEventListener('click', e => {
    const box = e.target.closest('.check-box');
    if (!box) return;
    const day = parseInt(box.dataset.day);
    const cur = state[day] || 0;
    state[day] = (cur + 1) % 3;
    localStorage.setItem('msnr_state', JSON.stringify(state));
    render();
  });

  render();
</script>
</body>
</html>
